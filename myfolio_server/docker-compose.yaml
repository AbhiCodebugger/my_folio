services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: myfolio
      POSTGRES_PASSWORD: "c3y1VJ_ZcJO2rFt8SszJ7NOmAHyUbiNs"
    volumes:
      - myfolio_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "T-lp1_cvf3UMBu5wDaURRoquzOLFhg95"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: myfolio_test
      POSTGRES_PASSWORD: "xwH51gEBPohEezKBPgXXauSPaeMfwjbQ"
    volumes:
      - myfolio_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "buO7krRVTqkTKTrwgRGeGCvo3JAOJmmI"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  myfolio_data:
  myfolio_test_data:
